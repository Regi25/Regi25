<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <!-- Background Soft Glows -->
    <radialGradient id="bg-glow-1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bg-glow-2" cx="80%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
    
    <!-- Accent Light Gradients -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB">
        <animate attributeName="stop-color" values="#2563EB;#06B6D4;#10B981;#2563EB" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#06B6D4">
        <animate attributeName="stop-color" values="#06B6D4;#10B981;#2563EB;#06B6D4" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981;#2563EB;#06B6D4;#10B981" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="ascii-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>

    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#0F172A" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.06" />
    </linearGradient>
    
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.04" />
    </filter>
  </defs>

  <style>
    .font-mono { font-family: 'Fira Code', 'Courier New', Courier, monospace; }
    .font-sans { font-family: 'Inter', 'SF Pro Display', -apple-system, sans-serif; }
    
    /* CSS Pulse / Hover transitions for Light Mode */
    .skill-pill { fill: #F8FAFC; stroke: rgba(15,23,42,0.08); transition: all 0.3s ease; cursor: pointer; }
    .skill-pill:hover { fill: #EDF2F7; stroke: #2563EB; }
    .skill-text { fill: #475569; transition: fill 0.3s ease; }
    .skill-pill:hover + .skill-text, .skill-text:hover { fill: #0F172A; }
  </style>

  <!-- Canvas Background (Pure Light Mode) -->
  <rect width="1180" height="610" rx="24" fill="#FFFFFF" />
  <rect width="1180" height="610" rx="24" fill="url(#bg-glow-1)" />
  <rect width="1180" height="610" rx="24" fill="url(#bg-glow-2)" />

  <!-- Animated Background Soft Particles -->
  <g opacity="0.4">
    <circle cx="100" cy="150" r="1.5" fill="#2563EB">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="1080" cy="200" r="2" fill="#06B6D4">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- LEFT PANEL: Light Mode ASCII / Cyber Logo -->
  <g transform="translate(50, 50)" filter="url(#soft-shadow)">
    <rect width="380" height="510" rx="16" fill="#F8FAFC" stroke="url(#border-grad)" stroke-width="1.5" />
    
    <g transform="translate(190, 240)">
      <animateTransform attributeName="transform" type="translate" values="190,235; 190,245; 190,235" dur="6s" repeatCount="indefinite" />
      <path d="M-80,-110 L80,-110 L110,-50 L80,10 L-80,10 L-110,-50 Z" fill="none" stroke="url(#accent-grad)" stroke-width="1.5" opacity="0.6" />
      
      <text class="font-mono" font-size="14" fill="url(#ascii-grad)" text-anchor="middle" y="-70" xml:space="preserve">
        <tspan x="0" dy="0">     ____________________     </tspan>
        <tspan x="0" dy="16">    /  __  __  __  __  \    </tspan>
        <tspan x="0" dy="16">   |  |  ||  ||  ||  |  |   </tspan>
        <tspan x="0" dy="16">   |  |  ||_ ||_ ||  |  |   </tspan>
        <tspan x="0" dy="16">   |  |__||__||__||__|  |   </tspan>
        <tspan x="0" dy="16">   |                    |   </tspan>
        <tspan x="0" dy="16">   |    [ SYSTEM: OK ]  |   </tspan>
        <tspan x="0" dy="16">    \__________________/    </tspan>
        <tspan x="0" dy="16">          ||      ||        </tspan>
        <tspan x="0" dy="16">       _ _||______||_ _     </tspan>
      </text>
    </g>
  </g>

  <!-- RIGHT PANEL: Terminal Window (Light Mode) -->
  <g transform="translate(470, 50)" filter="url(#soft-shadow)">
    <rect width="660" height="510" rx="16" fill="#F8FAFC" stroke="url(#border-grad)" stroke-width="1.5" />
    
    <g transform="translate(20, 20)">
      <circle cx="10" cy="10" r="6" fill="#EF4444" />
      <circle cx="30" cy="10" r="6" fill="#F59E0B" />
      <circle cx="50" cy="10" r="6" fill="#10B981" />
      <text class="font-mono" font-size="12" fill="#475569" x="80" y="14">bash - regi25@cz</text>
    </g>
    
    <line x1="0" y1="45" x2="660" y2="45" stroke="rgba(15,23,42,0.06)" stroke-width="1" />

    <g transform="translate(30, 80)">
      <text class="font-mono" font-size="16" fill="#475569" x="0" y="15">> whoami</text>
      <text class="font-sans" font-weight="800" font-size="34" fill="#0F172A" x="0" y="55">Regina Iuldasheva</text>
      
      <g transform="translate(0, 95)">
        <text class="font-mono" font-size="20" fill="url(#accent-grad)" font-weight="bold">
          <tspan x="0" y="0">Frontend Engineer</tspan>
          <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite" />
        </text>
        <rect x="210" y="-16" width="10" height="20" fill="#2563EB">
          <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
        </rect>
      </g>

      <!-- Stats Block -->
      <g transform="translate(0, 135)" class="font-mono" font-size="14">
        <g transform="translate(0, 0)">
          <text fill="#10B981" x="0" y="15">📍 Location:</text>
          <text fill="#0F172A" x="140" y="15">Czech Republic, České Budějovice</text>
        </g>
        <g transform="translate(0, 25)">
          <text fill="#06B6D4" x="0" y="15">🛠️ Building:</text>
          <text fill="#0F172A" x="140" y="15">AI Platforms &amp; Modern Web Architectures</text>
        </g>
        <g transform="translate(0, 50)">
          <text fill="#2563EB" x="0" y="15">🐙 GitHub:</text>
          <text fill="#06B6D4" x="140" y="15">github.com/Regi25</text>
        </g>
        <g transform="translate(0, 75)">
          <text fill="#2563EB" x="0" y="15">🌐 Portfolio:</text>
          <text fill="#06B6D4" x="140" y="15">my-profile-psi-nine.vercel.app</text>
        </g>
      </g>

      <!-- Skills Section -->
      <g transform="translate(0, 270)">
        <text class="font-mono" font-size="12" fill="#475569" x="0" y="0">CONFIGURED_SKILLS_SET:</text>
        <g transform="translate(0, 15)">
          <!-- Row 1 -->
          <g transform="translate(0, 0)">
            <rect class="skill-pill" x="0" y="0" width="80" height="30" rx="8" />
            <text class="font-sans skill-text" font-size="12" x="40" y="19" text-anchor="middle">React</text>
            
            <rect class="skill-pill" x="90" y="0" width="85" height="30" rx="8" />
            <text class="font-sans skill-text" font-size="12" x="132.5" y="19" text-anchor="middle">Next.js</text>
            
            <rect class="skill-pill" x="185" y="0" width="105" height="30" rx="8" />
            <text class="font-sans skill-text" font-size="12" x="237.5" y="19" text-anchor="middle">TypeScript</text>

            <rect class="skill-pill" x="300" y="0" width="100" height="30" rx="8" />
            <text class="font-sans skill-text" font-size="12" x="350" y="19" text-anchor="middle">Tailwind</text>

            <rect class="skill-pill" x="410" y="0" width="80" height="30" rx="8" />
            <text class="font-sans skill-text" font-size="12" x="450" y="19" text-anchor="middle">Zustand</text>
          </g>

          <!-- Row 2 -->
          <g transform="translate(0, 42)">
            <rect class="skill-pill" x="0" y="0" width="80" height="30" rx="8" />
            <text class="font-sans skill-text" font-size="12" x="40" y="19" text-anchor="middle">Node.js</text>
            
            <rect class="skill-pill" x="90" y="0" width="85" height="30" rx="8" />
            <text class="font-sans skill-text" font-size="12" x="132.5" y="19" text-anchor="middle">Postgres</text>
            
            <rect class="skill-pill" x="185" y="0" width="80" height="30" rx="8" />
            <text class="font-sans skill-text" font-size="12" x="225" y="19" text-anchor="middle">Docker</text>

            <rect class="skill-pill" x="275" y="0" width="65" height="30" rx="8" />
            <text class="font-sans skill-text" font-size="12" x="307.5" y="19" text-anchor="middle">Git</text>

            <rect class="skill-pill" x="350" y="0" width="80" height="30" rx="8" />
            <text class="font-sans skill-text" font-size="12" x="390" y="19" text-anchor="middle">Figma</text>
          </g>
        </g>
      </g>

      <!-- Bottom Social Row -->
      <g transform="translate(0, 380)">
        <g transform="translate(0, 0)">
          <circle cx="15" cy="15" r="15" fill="#EDF2F7" stroke="rgba(15,23,42,0.06)" />
          <path d="M15,5 C9.48,5 5,9.48 5,15 C5,19.42 7.87,23.17 11.84,24.5 C12.34,24.59 12.52,24.28 12.52,24.02 C12.52,23.78 12.51,22.95 12.5,22.09 C9.72,22.69 9.13,20.75 9.13,20.75 C8.68,19.59 8.02,19.28 8.02,19.28 C7.11,18.66 8.09,18.67 8.09,18.67 C9.1,18.74 9.63,19.71 9.63,19.71 C10.53,21.25 11.98,20.8 12.55,20.55 C12.64,19.9 12.9,19.46 13.19,19.21 C10.97,18.96 8.64,18.1 8.64,14.27 C8.64,13.18 9.03,12.29 9.67,11.59 C9.57,11.34 9.23,10.32 9.77,8.94 C9.77,8.94 10.61,8.67 12.52,9.96 C13.32,9.74 14.18,9.63 15,9.63 C15.82,9.63 16.68,9.74 17.48,9.96 C19.39,8.67 20.23,8.94 20.23,8.94 C20.77,10.32 20.43,11.34 20.33,11.59 C20.97,12.29 21.36,13.18 21.36,14.27 C21.36,18.11 19.03,18.95 16.8,19.2 C17.16,19.51 17.48,20.13 17.48,21.08 C17.48,22.44 17.47,23.54 17.47,23.87 C17.47,24.14 17.65,24.45 18.16,24.35 C22.13,23.02 25,19.27 25,14.85 C25,9.48 20.52,5 15,5 Z" fill="#475569" />
        </g>
        
        <g transform="translate(45, 0)">
          <circle cx="15" cy="15" r="15" fill="#EDF2F7" stroke="rgba(15,23,42,0.06)" />
          <path d="M10,11 H13 V12.5 H13.1 C13.5,11.7 14.5,11 16,11 C19,11 20,12.5 20,15.5 V21 H17 V16 C17,14.5 16.5,13.5 15,13.5 C13.8,13.5 13,14.3 13,15.5 V21 H10 V11 Z M6,7.5 C6,6.7 6.7,6 7.5,6 C8.3,6 9,6.7 9,7.5 C9,8.3 8.3,9 7.5,9 C6.7,9 6,8.3 6,7.5 Z M6,11 H9 V21 H6 V11 Z" fill="#475569" />
        </g>

        <g transform="translate(100, 7)" class="font-mono" font-size="11">
          <text fill="#10B981" x="0" y="10">● SYSTEM_STABLE_ONLINE</text>
        </g>
      </g>
    </g>
  </g>
</svg>
