<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <!-- Background Space Glows -->
    <radialGradient id="bg-glow-1" cx="15%" cy="15%" r="65%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#030712" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bg-glow-2" cx="85%" cy="85%" r="65%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#030712" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bg-glow-3" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#030712" stop-opacity="0" />
    </radialGradient>
    
    <!-- Ultra-premium Border Gradient -->
    <linearGradient id="glass-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22" />
      <stop offset="25%" stop-color="#FFFFFF" stop-opacity="0.03" />
      <stop offset="75%" stop-color="#FFFFFF" stop-opacity="0.01" />
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.25" />
    </linearGradient>

    <!-- Animated Accent Flow -->
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#10B981;#7C3AED;#22D3EE" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981;#7C3AED;#22D3EE;#10B981" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <filter id="glow-light" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <clipPath id="panel-clip">
      <rect x="0" y="0" width="430" height="510" rx="18" />
    </clipPath>
  </defs>

  <style>
    .font-mono { font-family: 'Fira Code', 'JetBrains Mono', 'Courier New', monospace; }
    .font-sans { font-family: 'Inter', 'SF Pro Display', -apple-system, sans-serif; }
    
    /* Interactive Skills Grid */
    .skill-pill { fill: #0B0F19; stroke: rgba(255,255,255,0.05); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; }
    .skill-pill:hover { fill: #1E293B; stroke: #22D3EE; transform: scale(1.04); }
    .skill-text { fill: #94A3B8; transition: fill 0.3s ease; pointer-events: none; }
    .skill-pill:hover + .skill-text, .skill-text:hover { fill: #F8FAFC; }

    /* Social Buttons */
    .social-btn { fill: #0B0F19; stroke: rgba(255,255,255,0.04); transition: all 0.3s ease; }
    .social-btn:hover { fill: #1E293B; stroke: #7C3AED; }
    .social-icon { fill: #64748B; transition: fill 0.3s ease; }
    .social-btn:hover + .social-icon, .social-icon:hover { fill: #F8FAFC; }
  </style>

  <!-- Deep Workspace Canvas -->
  <rect width="1180" height="610" rx="24" fill="#030712" />
  <rect width="1180" height="610" rx="24" fill="url(#bg-glow-1)" />
  <rect width="1180" height="610" rx="24" fill="url(#bg-glow-2)" />
  <rect width="1180" height="610" rx="24" fill="url(#bg-glow-3)" />

  <!-- 40 Tiny Cinematic Floating Particles -->
  <g opacity="0.4">
    <circle cx="120" cy="180" r="1" fill="#7C3AED"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" /></circle>
    <circle cx="280" cy="80" r="1.5" fill="#22D3EE"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite" /></circle>
    <circle cx="950" cy="140" r="1" fill="#10B981"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.5s" repeatCount="indefinite" /></circle>
    <circle cx="820" cy="480" r="1.2" fill="#7C3AED"><animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite" /></circle>
    <circle cx="540" cy="320" r="1" fill="#FFFFFF"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.5s" repeatCount="indefinite" /></circle>
    <circle cx="380" cy="530" r="1.5" fill="#22D3EE"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="4.5s" repeatCount="indefinite" /></circle>
  </g>

  <!-- High-End Reflection Sweep -->
  <g opacity="0.3">
    <line x1="-150" y1="0" x2="300" y2="610" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="80" transform="skewX(-15)">
      <animateTransform attributeName="transform" type="translate" from="-600,0" to="1200,0" dur="10s" repeatCount="indefinite" />
    </line>
  </g>

  <!-- ==================== LEFT PANEL: LIVE SSH WORKSPACE ==================== -->
  <g transform="translate(45, 50)">
    <rect width="430" height="510" rx="18" fill="#0A0F1D" fill-opacity="0.8" stroke="url(#glass-border)" stroke-width="1.5" />
    
    <!-- Window Control Bar -->
    <g transform="translate(20, 20)">
      <circle cx="10" cy="10" r="5" fill="#EF4444" opacity="0.85" />
      <circle cx="26" cy="10" r="5" fill="#F59E0B" opacity="0.85" />
      <circle cx="42" cy="10" r="5" fill="#10B981" opacity="0.85" />
      <text class="font-mono" font-size="11" fill="#475569" x="65" y="13">ssh - regina@github</text>
    </g>
    <line x1="0" y1="45" x2="430" y2="45" stroke="rgba(255,255,255,0.04)" stroke-width="1.2" />

    <!-- Pure SVG Sequential Typing Emulator -->
    <g transform="translate(25, 75)" class="font-mono" font-size="13">
      <!-- Line 1: ssh login -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" begin="0.2s" dur="0.1s" fill="freeze" />
        <text fill="#64748B" x="0" y="15"><tspan fill="#38BDF8">guest@regi25</tspan>:<tspan fill="#818CF8">~</tspan>$ ssh regina@github</text>
      </g>

      <!-- Line 2: Authenticating -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" begin="1.2s" dur="0.1s" fill="freeze" />
        <text fill="#94A3B8" x="0" y="38">Authenticating...</text>
      </g>

      <!-- Line 3: Connected Success -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" begin="2.2s" dur="0.1s" fill="freeze" />
        <text fill="#10B981" x="0" y="61">✔ Connected</text>
      </g>

      <!-- Line 4: Loading profile -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" begin="3.2s" dur="0.1s" fill="freeze" />
        <text fill="#94A3B8" x="0" y="84">Loading profile...</text>
      </g>

      <!-- Line 5: Progress loader block -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" begin="4.2s" dur="0.1s" fill="freeze" />
        <text fill="#22D3EE" x="0" y="107">[██████████] 100%</text>
      </g>

      <!-- Line 6: Initializing workspace -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" begin="5.2s" dur="0.1s" fill="freeze" />
        <text fill="#94A3B8" x="0" y="130">Initializing workspace...</text>
      </g>

      <!-- Line 7: Technology Stack ticks -->
      <g transform="translate(0, 153)" opacity="0">
        <animate attributeName="opacity" to="1" begin="6.2s" dur="0.1s" fill="freeze" />
        <text fill="#10B981" x="0" y="0">✔ <tspan fill="#E2E8F0">React</tspan></text>
        <text fill="#10B981" x="75" y="0">✔ <tspan fill="#E2E8F0">Next.js</tspan></text>
        <text fill="#10B981" x="160" y="0">✔ <tspan fill="#E2E8F0">TypeScript</tspan></text>
        <text fill="#10B981" x="265" y="0">✔ <tspan fill="#E2E8F0">Flutter</tspan></text>
      </g>

      <!-- Divider line -->
      <line x1="0" y1="180" x2="380" y2="180" stroke="rgba(255,255,255,0.03)" stroke-width="1" opacity="0">
        <animate attributeName="opacity" to="1" begin="7.0s" dur="0.5s" fill="freeze" />
      </line>

      <!-- Active IDE Environment Code Block -->
      <g transform="translate(0, 205)" class="font-mono" font-size="12">
        <g opacity="0"><animate attributeName="opacity" to="1" begin="7.5s" fill="freeze" /><text fill="#F472B6" x="0" y="15">const<tspan fill="#F8FAFC"> developer = {</tspan></text></g>
        <g opacity="0"><animate attributeName="opacity" to="1" begin="8.2s" fill="freeze" /><text fill="#F472B6" x="15" y="32">name<tspan fill="#94A3B8">:</tspan> <tspan fill="#38BDF8">"Regina"</tspan><tspan fill="#F8FAFC">,</tspan></text></g>
        <g opacity="0"><animate attributeName="opacity" to="1" begin="8.9s" fill="freeze" /><text fill="#F472B6" x="15" y="49">role<tspan fill="#38BDF8">"Frontend Engineer"</tspan><tspan fill="#F8FAFC">,</tspan></text></g>
        <g opacity="0"><animate attributeName="opacity" to="1" begin="9.6s" fill="freeze" /><text fill="#F472B6" x="15" y="66">location<tspan fill="#94A3B8">:</tspan> <tspan fill="#38BDF8">"Czech Republic"</tspan><tspan fill="#F8FAFC">,</tspan></text></g>
        <g opacity="0"><animate attributeName="opacity" to="1" begin="10.3s" fill="freeze" /><text fill="#F472B6" x="15" y="83">stack<tspan fill="#94A3B8">:</tspan> <tspan fill="#A78BFA">[</tspan><tspan fill="#34D399">"React"</tspan><tspan fill="#F8FAFC">, </tspan><tspan fill="#34D399">"Next.js"</tspan><tspan fill="#A78BFA">]</tspan></text></g>
        <g opacity="0"><animate attributeName="opacity" to="1" begin="11.0s" fill="freeze" /><text fill="#F8FAFC" x="0" y="100">};</text></g>
      </g>

      <!-- Active prompt line -->
      <g transform="translate(0, 335)" opacity="0">
        <animate attributeName="opacity" to="1" begin="11.5s" fill="freeze" />
        <text fill="#34D399" x="0" y="15">regina@portfolio:~$ <tspan fill="#F8FAFC">█</tspan></text>
        <rect x="178" y="1" width="8" height="15" fill="#0A0F1D">
          <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" />
        </rect>
      </g>
    </g>

    <!-- Scanner line sweep -->
    <g clip-path="url(#panel-clip)">
      <rect x="0" y="0" width="430" height="6" fill="url(#cyber-grad)" opacity="0.3" filter="url(#subtle-glow)">
        <animateTransform attributeName="transform" type="translate" from="0,-10" to="0,520" dur="6s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>

  <!-- ==================== RIGHT PANEL: SENIOR PRODUCT CARD ==================== -->
  <g transform="translate(505, 50)">
    <rect width="630" height="510" rx="18" fill="#0A0F1D" fill-opacity="0.85" stroke="url(#glass-border)" stroke-width="1.5" />
    
    <!-- Window header and simulated command bar -->
    <g transform="translate(25, 20)">
      <circle cx="10" cy="10" r="5" fill="#64748B" opacity="0.3" />
      <rect x="30" y="1.5" width="420" height="17" rx="6" fill="#030712" fill-opacity="0.4" stroke="rgba(255,255,255,0.03)" />
      <text class="font-mono" font-size="11" fill="#475569" x="210" y="13" text-anchor="middle">⌥ portfolio --show</text>
    </g>
    <line x1="0" y1="45" x2="630" y2="45" stroke="rgba(255,255,255,0.04)" stroke-width="1.2" />

    <!-- Info Block -->
    <g transform="translate(35, 75)">
      <!-- Name and Identity -->
      <text class="font-sans" font-weight="900" font-size="34" fill="#F8FAFC" x="0" y="32" letter-spacing="-1">Regina Iuldasheva</text>
      
      <!-- Philosophy typing slider (Updated to reflect actual values) -->
      <g transform="translate(0, 60)">
        <text class="font-mono" font-size="15" font-weight="bold" fill="url(#cyber-grad)">
          <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.95;1" dur="15s" repeatCount="indefinite" />
          
          <tspan x="0" y="0">
            <animate attributeName="visibility" values="visible;hidden" keyTimes="0;0.33" dur="15s" repeatCount="indefinite" />
            Building modern React applications_
          </tspan>
          <tspan x="0" y="0">
            <animate attributeName="visibility" values="hidden;visible;hidden" keyTimes="0;0.33;0.66" dur="15s" repeatCount="indefinite" />
            Crafting responsive web experiences_
          </tspan>
          <tspan x="0" y="0">
            <animate attributeName="visibility" values="hidden;visible" keyTimes="0;0.66" dur="15s" repeatCount="indefinite" />
            React • Next.js • Tailwind CSS_
          </tspan>
        </text>
      </g>

      <!-- Horizontal Divider -->
      <line x1="0" y1="85" x2="560" y2="85" stroke="rgba(255,255,255,0.04)" stroke-width="1" />

      <!-- High-End Split Layout -->
      <g transform="translate(0, 105)">
        <!-- Left Side: Current Mission -->
        <g transform="translate(0, 0)">
          <text class="font-mono" font-size="11" fill="#64748B" x="0" y="10">CURRENT_MISSION:</text>
          
          <g transform="translate(0, 25)" class="font-sans" font-size="13" font-weight="500" fill="#E2E8F0">
            <text x="0" y="12">→ <tspan fill="#F8FAFC" font-weight="700">Building</tspan> modern, faster interfaces</text>
            <text x="0" y="34">→ <tspan fill="#F8FAFC" font-weight="700">Integrating</tspan> production AI Agents</text>
            <text x="0" y="56">→ <tspan fill="#F8FAFC" font-weight="700">Writing</tspan> elegant TypeScript code</text>
          </g>
        </g>

        <!-- Right Side: Real-time Status Metrics -->
        <g transform="translate(340, 0)">
          <text class="font-mono" font-size="11" fill="#64748B" x="0" y="10">STATUS_METRICS:</text>
          
          <g transform="translate(0, 25)" class="font-mono" font-size="12">
            <g transform="translate(0,0)">
              <text fill="#64748B" x="0" y="10">Coffee:</text>
              <text fill="#22D3EE" x="70" y="10">[███████░] 92%</text>
            </g>
            <g transform="translate(0,20)">
              <text fill="#64748B" x="0" y="10">Focus:</text>
              <text fill="#10B981" x="70" y="10">Clean UX</text>
            </g>
            <g transform="translate(0,40)">
              <text fill="#64748B" x="0" y="10">Brain:</text>
              <text fill="#A78BFA" x="70" y="10">Learning AI</text>
            </g>
          </g>
        </g>
      </g>

      <!-- Horizontal Divider -->
      <line x1="0" y1="205" x2="560" y2="205" stroke="rgba(255,255,255,0.04)" stroke-width="1" />

      <!-- SKILLS_INVENTORY (Clean Modern React Ecosystem) -->
      <g transform="translate(0, 225)">
        <text class="font-mono" font-size="11" fill="#64748B" x="0" y="10">SKILLS_INVENTORY:</text>
        
        <g transform="translate(0, 25)">
          <!-- Row 1 -->
          <g transform="translate(0, 0)">
            <!-- React -->
            <g transform="translate(0,0)">
              <rect class="skill-pill" width="90" height="30" rx="8" />
              <text class="font-sans skill-text" font-size="12" font-weight="600" x="45" y="19" text-anchor="middle">⚛ React</text>
            </g>
            <!-- Next.js -->
            <g transform="translate(100,0)">
              <rect class="skill-pill" width="95" height="30" rx="8" />
              <text class="font-sans skill-text" font-size="12" font-weight="600" x="47.5" y="19" text-anchor="middle">▲ Next.js</text>
            </g>
            <!-- TypeScript -->
            <g transform="translate(205,0)">
              <rect class="skill-pill" width="115" height="30" rx="8" />
              <text class="font-sans skill-text" font-size="12" font-weight="600" x="57.5" y="19" text-anchor="middle">TS TypeScript</text>
            </g>
            <!-- Tailwind CSS -->
            <g transform="translate(330,0)">
              <rect class="skill-pill" width="105" height="30" rx="8" />
              <text class="font-sans skill-text" font-size="12" font-weight="600" x="52.5" y="19" text-anchor="middle">🍃 Tailwind CSS</text>
            </g>
          </g>

          <!-- Row 2 -->
          <g transform="translate(0, 42)">
            <!-- Zustand -->
            <g transform="translate(0,0)">
              <rect class="skill-pill" width="90" height="30" rx="8" />
              <text class="font-sans skill-text" font-size="12" font-weight="600" x="45" y="19" text-anchor="middle">🐻 Zustand</text>
            </g>
            <!-- TanStack Query -->
            <g transform="translate(100,0)">
              <rect class="skill-pill" width="115" height="30" rx="8" />
              <text class="font-sans skill-text" font-size="12" font-weight="600" x="57.5" y="19" text-anchor="middle">🌀 TanStack</text>
            </g>
            <!-- Shadcn/UI -->
            <g transform="translate(225,0)">
              <rect class="skill-pill" width="105" height="30" rx="8" />
              <text class="font-sans skill-text" font-size="12" font-weight="600" x="52.5" y="19" text-anchor="middle">✨ Shadcn/UI</text>
            </g>
            <!-- Framer Motion -->
            <g transform="translate(340,0)">
              <rect class="skill-pill" width="95" height="30" rx="8" />
              <text class="font-sans skill-text" font-size="12" font-weight="600" x="47.5" y="19" text-anchor="middle">🎬 Framer</text>
            </g>
          </g>
        </g>
      </g>

      <!-- ==================== SOCIAL / BOTTOM FOOTER ==================== -->
      <g transform="translate(0, 395)">
        <g transform="translate(0, 0)">
          <rect class="social-btn" width="32" height="32" rx="10" />
          <path class="social-icon" d="M16,7 C11.03,7 7,11.03 7,16 C7,19.97 9.58,23.35 13.15,24.54 C13.6,24.62 13.76,24.35 13.76,24.11 C13.76,23.9 13.75,23.15 13.75,22.38 C11.25,22.92 10.72,21.18 10.72,21.18 C10.31,20.14 9.72,19.86 9.72,19.86 C8.9,19.3 9.78,19.31 9.78,19.31 C10.69,19.37 11.17,20.24 11.17,20.24 C11.98,21.62 13.29,21.22 13.8,21 C13.88,20.41 14.12,20.01 14.38,19.79 C12.38,19.56 10.28,18.79 10.28,15.34 C10.28,14.36 10.63,13.56 11.21,12.93 C11.12,12.71 10.81,11.79 11.3,10.55 C11.3,10.55 12.05,10.31 13.77,11.47 C14.49,11.27 15.26,11.17 16,11.17 C16.74,11.17 17.51,11.27 18.23,11.47 C19.95,10.31 20.7,10.55 20.7,10.55 C21.19,11.79 20.88,12.71 20.79,12.93 C21.37,13.56 21.72,14.36 21.72,15.34 C21.72,18.8 19.62,19.56 17.61,19.78 C17.93,20.06 18.22,20.62 18.22,21.48 C18.22,22.7 18.21,23.7 18.21,24 C18.21,24.25 18.37,24.53 18.83,24.44 C22.41,23.24 25,19.87 25,15.9 C25,10.93 20.97,7 16,7 Z" />
        </g>
        
        <g transform="translate(45, 0)">
          <rect class="social-btn" width="32" height="32" rx="10" />
          <path class="social-icon" d="M12,13 H14.5 V14.5 H14.55 C14.9,13.8 15.8,13 17.2,13 C20,13 21,14.5 21,17.2 V22 H18 V17.5 C18,16.2 17.5,15.2 16,15.2 C14.8,15.2 14,16 14,17.2 V22 H11 V13 Z M8,9.5 C8,8.7 8.7,8 9.5,8 C10.3,8 11,8.7 11,9.5 C11,10.3 10.3,11 9.5,11 C8.7,11 8,10.3 8,9.5 Z M8,13 H11 V22 H8 V13 Z" />
        </g>

        <!-- Status Dot -->
        <g transform="translate(95, 7)" class="font-mono" font-size="12">
          <circle cx="10" cy="5" r="4" fill="#10B981" filter="url(#glow-light)">
            <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
          </circle>
          <text fill="#10B981" x="22" y="9">SYSTEM_READY</text>
        </g>
      </g>
    </g>
  </g>
</svg>



